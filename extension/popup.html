<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 260px; margin: 0; padding: 14px; font: 13px/1.4 system-ui, sans-serif; background: #0b0d14; color: #c8d2e0; }
      h1 { font-size: 14px; margin: 0 0 10px; color: #eaf0f8; }
      label { display: block; margin: 10px 0 4px; color: #8c97ab; }
      input[type="text"] { width: 100%; box-sizing: border-box; padding: 7px 9px; border-radius: 8px; border: 1px solid #2a2f3a; background: #11131a; color: #eaf0f8; }
      .row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
      button { width: 100%; margin-top: 14px; cursor: pointer; border: none; border-radius: 999px; padding: 8px; font-weight: 600; color: #0b0d14; background: #dce3ee; }
      .hint { margin-top: 10px; color: #5c6675; font-size: 11px; }
    </style>
  </head>
  <body>
    <h1>Cloakroom</h1>
    <div class="row">
      <input type="checkbox" id="enabled" /> <span>Enabled</span>
    </div>
    <label for="apiBase">Cloakroom API base</label>
    <input type="text" id="apiBase" placeholder="https://cloakroom-mu.vercel.app/api" />
    <label for="sessionId">Session id</label>
    <input type="text" id="sessionId" placeholder="cloak-ext" />
    <button id="save">Save</button>
    <p class="hint">On ChatGPT/Claude: type, click “🛡 Cloak input” (or Ctrl/Cmd+Shift+M), then send. Replies unmask automatically.</p>
    <script src="popup.js"></script>
  </body>
</html>
